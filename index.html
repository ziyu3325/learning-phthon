<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>朋友圈性格分析助手 - 助你脱单</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="gradient-bg py-8 px-4 text-white text-center shadow-lg">
        <h1 class="text-3xl font-bold mb-2">朋友圈性格分析助手</h1>
        <p class="text-sm opacity-90">上传 5 张截图，解锁 TA 的内心世界</p>
    </div>

    <main class="max-w-2xl mx-auto p-4 -mt-6">
        <!-- 上传区域 -->
        <div class="glass-card rounded-2xl shadow-xl p-6 mb-6">
            <div id="upload-section">
                <div class="mb-4">
                    <label class="block text-gray-700 text-sm font-bold mb-2">上传朋友圈截图 (至少 5 张)</label>
                    <div id="drop-zone" class="border-2 border-dashed border-purple-300 rounded-xl p-8 text-center hover:border-purple-500 transition-colors cursor-pointer">
                        <input type="file" id="file-input" multiple accept="image/*" class="hidden">
                        <div class="text-gray-500">
                            <svg class="w-12 h-12 mx-auto mb-2 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                            </svg>
                            <p id="upload-status">点击或拖拽上传图片</p>
                            <p class="text-xs mt-2">支持 JPG, PNG, WEBP</p>
                        </div>
                    </div>
                </div>

                <!-- 预览图 -->
                <div id="preview-container" class="grid grid-cols-3 gap-2 mb-6 hidden">
                    <!-- 动态插入预览图 -->
                </div>

                <button id="analyze-btn" disabled class="w-full bg-purple-600 text-white font-bold py-3 px-4 rounded-xl shadow-md hover:bg-purple-700 disabled:bg-gray-300 disabled:cursor-not-allowed transition-all">
                    开始智能分析
                </button>
            </div>

            <!-- 加载状态 -->
            <div id="loading-section" class="hidden text-center py-10">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-purple-600 mx-auto mb-4"></div>
                <p class="text-purple-600 font-medium">豆包大模型正在分析中...</p>
                <p class="text-gray-400 text-sm mt-2">预计需要 10-20 秒</p>
            </div>
        </div>

        <!-- 结果展示 -->
        <div id="result-section" class="hidden">
            <div class="glass-card rounded-2xl shadow-xl p-6 mb-6">
                <h2 class="text-xl font-bold text-purple-800 mb-4 flex items-center">
                    <span class="mr-2">✨</span> 分析报告
                </h2>
                <div id="analysis-content" class="prose prose-purple max-w-none text-gray-700">
                    <!-- 动态插入 Markdown 渲染后的结果 -->
                </div>
                
                <div class="flex flex-col gap-3 mt-8">
                    <button id="save-image-btn" class="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white font-bold py-3 px-4 rounded-xl shadow-md hover:opacity-90 transition-all flex items-center justify-center">
                        <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                        </svg>
                        保存为长图
                    </button>
                    <button onclick="window.location.reload()" class="w-full border-2 border-purple-600 text-purple-600 font-bold py-2 px-4 rounded-xl hover:bg-purple-50 transition-all">
                        重新分析
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const previewContainer = document.getElementById('preview-container');
        const analyzeBtn = document.getElementById('analyze-btn');
        const uploadStatus = document.getElementById('upload-status');
        const uploadSection = document.getElementById('upload-section');
        const loadingSection = document.getElementById('loading-section');
        const resultSection = document.getElementById('result-section');
        const analysisContent = document.getElementById('analysis-content');
        const saveImageBtn = document.getElementById('save-image-btn');

        let selectedFiles = [];

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            const newFiles = Array.from(files);
            selectedFiles = [...selectedFiles, ...newFiles];
            updatePreview();
        }

        function updatePreview() {
            previewContainer.innerHTML = '';
            if (selectedFiles.length > 0) {
                previewContainer.classList.remove('hidden');
                selectedFiles.forEach((file, index) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const div = document.createElement('div');
                        div.className = 'relative aspect-square rounded-lg overflow-hidden shadow-sm';
                        div.innerHTML = `
                            <img src="${e.target.result}" class="w-full h-full object-cover">
                            <button onclick="removeFile(${index})" class="absolute top-1 right-1 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs">×</button>
                        `;
                        previewContainer.appendChild(div);
                    };
                    reader.readAsDataURL(file);
                });
            } else {
                previewContainer.classList.add('hidden');
            }

            uploadStatus.innerText = `已选择 ${selectedFiles.length} 张图片`;
            analyzeBtn.disabled = selectedFiles.length < 5;
        }

        window.removeFile = (index) => {
            selectedFiles.splice(index, 1);
            updatePreview();
        };

        analyzeBtn.addEventListener('click', async () => {
            const formData = new FormData();
            selectedFiles.forEach(file => {
                formData.append('images', file);
            });

            uploadSection.classList.add('hidden');
            loadingSection.classList.remove('hidden');

            try {
                // 请求本地后端转发服务
                const response = await fetch('http://localhost:3000/api/analyze', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();
                if (data.error) {
                    alert('分析失败：' + data.error);
                    uploadSection.classList.remove('hidden');
                    loadingSection.classList.add('hidden');
                } else {
                    loadingSection.classList.add('hidden');
                    resultSection.classList.remove('hidden');
                    analysisContent.innerHTML = marked.parse(data.result);
                }
            } catch (error) {
                console.error(error);
                alert('连接后端服务失败！\n\n请确保您已在终端运行了：\n1. cd backend\n2. node server.js');
                uploadSection.classList.remove('hidden');
                loadingSection.classList.add('hidden');
            }
        });

        saveImageBtn.addEventListener('click', () => {
            const element = document.getElementById('result-section');
            const originalDisplay = saveImageBtn.parentElement.style.display;
            saveImageBtn.parentElement.style.display = 'none';

            html2canvas(element, {
                useCORS: true,
                scale: 2,
                backgroundColor: '#f9fafb'
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `朋友圈分析报告_${new Date().getTime()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                saveImageBtn.parentElement.style.display = originalDisplay;
            });
        });
    </script>
</body>
</html>
